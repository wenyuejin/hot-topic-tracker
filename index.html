<html lang="zh-CN">

<title>热点追踪器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0C0C0C;color:#F9F9F9;font-family:-apple-system,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:32px 20px}
@media(min-width:768px){.container{padding:48px 48px}}
.header-live{display:flex;align-items:center;gap:12px;margin-bottom:8px;font-size:12px}
.dot{width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,#FF5A65,#7B6ED6)}
.live-text{color:#A0A0A0;font-weight:500;letter-spacing:1px}
.clock{color:#6B6B6B;font-family:"Helvetica Neue",Arial,sans-serif}
h1{font-size:48px;font-weight:700;letter-spacing:-0.02em;margin-bottom:12px}
@media(min-width:768px){h1{font-size:56px}}
.subtitle{color:#A0A0A0;font-size:14px;margin-bottom:4px}
.update-time{color:#6B6B6B;font-size:13px;margin-bottom:24px}
.mode-switch{display:flex;gap:8px;margin-bottom:40px}
.mode-btn{padding:8px 20px;border-radius:999px;border:none;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;background:#1E1E1E;color:#A0A0A0}
.mode-btn.active{background:linear-gradient(135deg,#FF5A65,#7B6ED6);color:#fff}
.mode-btn:hover:not(.active){color:#F9F9F9}
.loading{display:flex;flex-direction:column;align-items:center;gap:16px;padding:60px 0}
.spinner{width:32px;height:32px;border:2px solid #FF5A65;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:#6B6B6B;font-size:14px}
.grid{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:768px){.grid{grid-template-columns:1fr 1fr;gap:24px}}
.card{background:#161616;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:20px;transition:all .3s}
.card:hover{transform:translateY(-2px);border-color:rgba(255,90,101,0.15)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.platform-info{display:flex;align-items:center;gap:12px}
.platform-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:14px;font-weight:bold}
.platform-name{font-weight:600;font-size:15px}
.platform-viewers{font-size:12px;color:#6B6B6B}
.view-all{font-size:12px;color:#6B6B6B;cursor:pointer}
.view-all:hover{color:#FF5A65}
.topic{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:14px;cursor:pointer}
.topic:hover .topic-title{color:#FF5A65}
.rank{width:22px;text-align:center;font-weight:bold;font-size:13px;font-family:"Helvetica Neue",Arial,sans-serif;flex-shrink:0}
.rank.hot{background:linear-gradient(135deg,#FF5A65,#7B6ED6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topic-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .2s}
.heat-bar{height:4px;border-radius:2px;background:linear-gradient(90deg,#FF5A65,#7B6ED6);flex-shrink:0;display:none}
@media(min-width:640px){.heat-bar{display:block}}
.heat-text{font-size:12px;color:#6B6B6B;flex-shrink:0;font-family:"Helvetica Neue",Arial,sans-serif;min-width:40px;text-align:right}
.timeline-list{background:#161616;border:1px solid rgba(255,255,255,0.06);border-radius:12px;overflow:hidden}
.timeline-item{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;transition:background .2s}
.timeline-item:last-child{border-bottom:none}
.timeline-item:hover{background:rgba(255,90,101,0.04)}
.trend-line{width:3px;align-self:stretch;border-radius:2px;background:linear-gradient(180deg,#FF5A65,#7B6ED6);flex-shrink:0}
.timeline-rank{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#FF5A65,#7B6ED6);display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:bold;flex-shrink:0;font-family:"Helvetica Neue",Arial,sans-serif}
.timeline-rank.small{width:24px;height:24px;font-size:11px}
.timeline-content{flex:1;min-width:0}
.timeline-title{font-size:15px;font-weight:500;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.timeline-platforms{display:flex;gap:10px;flex-wrap:wrap}
.plat-tag{display:flex;align-items:center;gap:4px;font-size:12px;color:#A0A0A0}
.plat-dot{width:6px;height:6px;border-radius:50%}
.timeline-heat{display:flex;align-items:center;gap:8px;flex-shrink:0}
.timeline-heat-val{font-size:13px;color:#A0A0A0;font-family:"Helvetica Neue",Arial,sans-serif;display:none}
@media(min-width:640px){.timeline-heat-val{display:block}}
.trend-icon{font-size:16px}
.trend-up{color:#FF5A65}
.trend-down{color:#4ADE80}
.trend-flat{color:#6B6B6B}
.footer{text-align:center;margin-top:48px;padding-bottom:40px}
.footer-text{font-size:14px;color:#A0A0A0;margin-bottom:4px}
.footer-small{font-size:12px;color:#6B6B6B}
.section-title{font-size:24px;font-weight:700;margin-bottom:8px}
.section-desc{font-size:14px;color:#A0A0A0;margin-bottom:24px}
.hidden{display:none}
.fallback-note{text-align:center;color:#6B6B6B;font-size:12px;margin-top:8px}
</style>
</head>

const PLATFORM_COLOR={'微博':'#E6162D','知乎':'#0084FF','百度':'#2932E1','B站':'#00A1D6','抖音':'#FE2C55'};
let currentMode='dashboard';

// Clock
function updateClock(){
  const now=new Date();
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  const s=String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent=`${h}:${m}:${s}`;
}
setInterval(updateClock,1000);updateClock();

// Mode switch
function switchMode(mode,btn){
  currentMode=mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(mode==='dashboard'){
    document.getElementById('dashboard').classList.remove('hidden');
    document.getElementById('timeline').classList.add('hidden');
  }else{
    document.getElementById('dashboard').classList.add('hidden');
    document.getElementById('timeline').classList.remove('hidden');
  }
}

// Try to fetch from API, fallback to static data if fails
async function init(){
  document.getElementById('loading').classList.remove('hidden');
  
  let data=null;
  let isFallback=false;
  
  // Try API
  try{
    const res=await fetch('https://api.vvhan.com/api/hotlist/wbhot',{mode:'no-cors'});
    // no-cors means we can't read the response, so this is just a connectivity test
    // If we get here without error, API might be available but we can't read it
    // So we just use fallback data for now
    data=FALLBACK_DATA;
    isFallback=true;
  }catch(e){
    data=FALLBACK_DATA;
    isFallback=true;
  }
  
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('updateTime').textContent=`${data.updateTime} ${isFallback?'（API暂不可用，显示缓存数据）':'实时更新'}`;
  
  if(isFallback){
    document.getElementById('fallbackNote').textContent='API接口暂时无法访问，当前显示为缓存数据';
    document.getElementById('fallbackNote').classList.remove('hidden');
  }
  
  renderDashboard(data.platforms);
  renderTimeline(data.timeline);
  
  if(currentMode==='dashboard'){
    document.getElementById('dashboard').classList.remove('hidden');
  }else{
    document.getElementById('timeline').classList.remove('hidden');
  }
}

function renderDashboard(platforms){
  const el=document.getElementById('dashboard');
  el.innerHTML=platforms.map(pf=>{
    const maxHeat=Math.max(...pf.topics.map(t=>t.heat));
    return `<div class="card">
      <div class="card-header">
        <div class="platform-info">
          <div class="platform-icon" style="background:${pf.color}">${pf.icon}</div>
          <div><div class="platform-name">${pf.name}</div><div class="platform-viewers">${pf.viewerCount}人在看</div></div>
        </div>
        <span class="view-all">查看全部 →</span>
      </div>
      ${pf.topics.map(t=>{
        const isTop3=t.rank<=3;
        const barWidth=(t.heat/maxHeat)*100;
        return `<div class="topic">
          <span class="rank ${isTop3?'hot':''}">${t.rank}</span>
          <span class="topic-title">${t.title}</span>
          ${isTop3?`<div class="heat-bar" style="width:${Math.max(barWidth,10)}px"></div>`:''}
          <span class="heat-text">${t.heatDisplay}</span>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

function renderTimeline(timeline){
  const el=document.getElementById('timelineList');
  el.innerHTML=timeline.map(item=>{
    const isTop3=item.rank<=3;
    const trendClass=item.trend==='up'?'trend-up':item.trend==='down'?'trend-down':'trend-flat';
    const trendIcon=item.trend==='up'?'↑':item.trend==='down'?'↓':'—';
    return `<div class="timeline-item">
      <div class="trend-line"></div>
      <div class="timeline-rank ${!isTop3?'small':''}">${item.rank}</div>
      <div class="timeline-content">
        <div class="timeline-title">${item.title}</div>
        <div class="timeline-platforms">
          ${item.platforms.map(p=>`<span class="plat-tag"><span class="plat-dot" style="background:${PLATFORM_COLOR[p]||'#6B6B6B'}"></span>${p}</span>`).join('')}
        </div>
      </div>
      <div class="timeline-heat">
        <span class="timeline-heat-val">${item.heatDisplay}</span>
        <span class="trend-icon ${trendClass}">${trendIcon}</span>
      </div>
    </div>`;
  }).join('');
}

init();
</script>
