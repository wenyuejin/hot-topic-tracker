<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>热点追踪器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0C0C0C;
      color: #F9F9F9;
      font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px;
    }
    @media (min-width: 768px) {
      .container { padding: 48px 48px; }
    }

    /* Header */
    .header-live {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FF5A65, #7B6ED6);
    }
    .live-text {
      color: #A0A0A0;
      font-weight: 500;
      letter-spacing: 1px;
    }
    .clock {
      color: #6B6B6B;
      font-family: "Helvetica Neue", Arial, sans-serif;
    }
    h1 {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }
    @media (min-width: 768px) {
      h1 { font-size: 56px; }
    }
    .subtitle {
      color: #A0A0A0;
      font-size: 14px;
      margin-bottom: 4px;
    }
    .update-time {
      color: #6B6B6B;
      font-size: 13px;
      margin-bottom: 24px;
    }

    /* Mode Switch */
    .mode-switch {
      display: flex;
      gap: 8px;
      margin-bottom: 40px;
    }
    .mode-btn {
      padding: 8px 20px;
      border-radius: 999px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      background: #1E1E1E;
      color: #A0A0A0;
    }
    .mode-btn.active {
      background: linear-gradient(135deg, #FF5A65, #7B6ED6);
      color: #fff;
    }
    .mode-btn:hover:not(.active) {
      color: #F9F9F9;
    }

    /* Loading */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 80px 0;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid #FF5A65;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: #6B6B6B; font-size: 14px; }

    /* Error */
    .error {
      text-align: center;
      padding: 60px 20px;
      color: #A0A0A0;
    }
    .error-btn {
      margin-top: 16px;
      padding: 8px 24px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #FF5A65, #7B6ED6);
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }

    /* Dashboard Grid */
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    @media (min-width: 768px) {
      .grid { grid-template-columns: 1fr 1fr; gap: 24px; }
    }

    /* Card */
    .card {
      background: #161616;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.3s;
    }
    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(255,90,101,0.15);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .platform-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .platform-icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      font-weight: bold;
    }
    .platform-name {
      font-weight: 600;
      font-size: 15px;
    }
    .platform-viewers {
      font-size: 12px;
      color: #6B6B6B;
    }
    .view-all {
      font-size: 12px;
      color: #6B6B6B;
      cursor: pointer;
    }
    .view-all:hover { color: #FF5A65; }

    .topic {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 0;
      font-size: 14px;
      cursor: pointer;
    }
    .topic:hover .topic-title { color: #FF5A65; }
    .rank {
      width: 22px;
      text-align: center;
      font-weight: bold;
      font-size: 13px;
      font-family: "Helvetica Neue", Arial, sans-serif;
      flex-shrink: 0;
    }
    .rank.hot {
      background: linear-gradient(135deg, #FF5A65, #7B6ED6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .topic-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: color 0.2s;
    }
    .heat-bar {
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(90deg, #FF5A65, #7B6ED6);
      flex-shrink: 0;
      display: none;
    }
    @media (min-width: 640px) {
      .heat-bar { display: block; }
    }
    .heat-text {
      font-size: 12px;
      color: #6B6B6B;
      flex-shrink: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      min-width: 40px;
      text-align: right;
    }

    /* Timeline */
    .timeline-list {
      background: #161616;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      overflow: hidden;
    }
    .timeline-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      cursor: pointer;
      transition: background 0.2s;
    }
    .timeline-item:last-child { border-bottom: none; }
    .timeline-item:hover { background: rgba(255,90,101,0.04); }

    .trend-line {
      width: 3px;
      align-self: stretch;
      border-radius: 2px;
      background: linear-gradient(180deg, #FF5A65, #7B6ED6);
      flex-shrink: 0;
    }
    .timeline-rank {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FF5A65, #7B6ED6);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
      font-weight: bold;
      flex-shrink: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
    }
    .timeline-rank.small {
      width: 24px; height: 24px;
      font-size: 11px;
    }
    .timeline-content {
      flex: 1;
      min-width: 0;
    }
    .timeline-title {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .timeline-platforms {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .plat-tag {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #A0A0A0;
    }
    .plat-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }
    .timeline-heat {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .timeline-heat-val {
      font-size: 13px;
      color: #A0A0A0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      display: none;
    }
    @media (min-width: 640px) {
      .timeline-heat-val { display: block; }
    }
    .trend-icon {
      font-size: 16px;
    }
    .trend-up { color: #FF5A65; }
    .trend-down { color: #4ADE80; }
    .trend-flat { color: #6B6B6B; }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 48px;
      padding-bottom: 40px;
    }
    .footer-text {
      font-size: 14px;
      color: #A0A0A0;
      margin-bottom: 4px;
    }
    .footer-small {
      font-size: 12px;
      color: #6B6B6B;
    }

    /* Section title */
    .section-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .section-desc {
      font-size: 14px;
      color: #A0A0A0;
      margin-bottom: 24px;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header-live">
      <div class="dot"></div>
      <span class="live-text">LIVE</span>
      <span class="clock" id="clock">--:--:--</span>
    </div>
    <h1>热点追踪器</h1>
    <p class="subtitle">每日全网热点话题聚合 · 早晚两次更新</p>
    <p class="update-time" id="updateTime">正在获取数据...</p>

    <!-- Mode Switch -->
    <div class="mode-switch">
      <button class="mode-btn active" onclick="switchMode('dashboard')">仪表盘</button>
      <button class="mode-btn" onclick="switchMode('timeline')">时间线</button>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p class="loading-text">正在实时抓取全网热点...</p>
    </div>

    <!-- Error -->
    <div class="error hidden" id="error">
      <p>数据获取失败，可能是网络问题或API暂时不可用</p>
      <button class="error-btn" onclick="fetchData()">重新加载</button>
    </div>

    <!-- Dashboard -->
    <div class="grid hidden" id="dashboard"></div>

    <!-- Timeline -->
    <div class="hidden" id="timeline">
      <div class="section-title">全网热度趋势</div>
      <p class="section-desc">按热度排序，展示最受关注的话题</p>
      <div class="timeline-list" id="timelineList"></div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <p class="footer-text">热点追踪器 · 每日全网热点聚合</p>
      <p class="footer-small">数据来源于公开平台 · 仅供个人参考使用</p>
    </div>
  </div>

  <script>
    const APIS = {
      weibo: 'https://api.vvhan.com/api/hotlist/wbhot',
      zhihu: 'https://api.vvhan.com/api/hotlist/zhihu',
      baidu: 'https://api.vvhan.com/api/hotlist/baidu',
      bilibili: 'https://api.vvhan.com/api/hotlist/bilibili',
      douyin: 'https://api.vvhan.com/api/hotlist/douyin',
    };

    const PLATFORM_META = {
      weibo: { name: '微博热搜', color: '#E6162D', icon: '微' },
      zhihu: { name: '知乎热榜', color: '#0084FF', icon: '知' },
      baidu: { name: '百度热搜', color: '#2932E1', icon: '百' },
      bilibili: { name: 'B站热门', color: '#00A1D6', icon: 'B' },
      douyin: { name: '抖音热榜', color: '#FE2C55', icon: '抖' },
    };

    const PLATFORM_COLOR = {
      '微博': '#E6162D', '知乎': '#0084FF', '百度': '#2932E1',
      'B站': '#00A1D6', '抖音': '#FE2C55'
    };

    let currentMode = 'dashboard';
    let cachedData = null;

    // Clock
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('clock').textContent = `${h}:${m}:${s}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Mode switch
    function switchMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');

      if (mode === 'dashboard') {
        document.getElementById('dashboard').classList.remove('hidden');
        document.getElementById('timeline').classList.add('hidden');
      } else {
        document.getElementById('dashboard').classList.add('hidden');
        document.getElementById('timeline').classList.remove('hidden');
      }
      if (cachedData) render();
    }

    // Fetch with timeout
    async function fetchJSON(url, timeout = 8000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeout);
      try {
        const res = await fetch(url, { signal: controller.signal });
        clearTimeout(timer);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return await res.json();
      } catch (e) {
        clearTimeout(timer);
        throw e;
      }
    }

    async function fetchPlatform(key) {
      try {
        const data = await fetchJSON(APIS[key]);
        return { key, data };
      } catch (e) {
        return { key, data: null };
      }
    }

    function parseTopics(key, apiData) {
      if (!apiData || !Array.isArray(apiData.data)) return null;
      const raw = apiData.data.slice(0, 20);
      return raw.map((item, idx) => {
        const title = item.title || item.name || '未知话题';
        const hotVal = item.hot || item.heat || item.hotValue || '0';
        let heatNum = 0;
        if (typeof hotVal === 'string') {
          const match = hotVal.match(/[\d.]+/);
          if (match) {
            const num = parseFloat(match[0]);
            if (hotVal.includes('亿')) heatNum = num * 100000000;
            else if (hotVal.includes('万')) heatNum = num * 10000;
            else heatNum = num;
          }
        } else if (typeof hotVal === 'number') {
          heatNum = hotVal;
        }
        return {
          rank: idx + 1,
          title,
          heat: Math.floor(heatNum) || (20 - idx) * 100000,
          heatDisplay: typeof hotVal === 'string' && hotVal ? hotVal : String(heatNum),
        };
      });
    }

    function similarity(a, b) {
      const s1 = new Set(a);
      const s2 = new Set(b);
      let common = 0;
      for (const ch of s1) if (s2.has(ch)) common++;
      return common / Math.max(s1.size, s2.size);
    }

    function formatHeat(num) {
      if (num >= 100000000) return (num / 100000000).toFixed(1) + '亿';
      if (num >= 10000) return Math.floor(num / 10000) + '万';
      return String(num);
    }

    async function fetchData() {
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('dashboard').classList.add('hidden');
      document.getElementById('timeline').classList.add('hidden');

      const results = await Promise.all(Object.keys(APIS).map(key => fetchPlatform(key)));
      const platforms = [];

      for (const { key, data } of results) {
        const topics = parseTopics(key, data);
        if (topics) {
          const meta = PLATFORM_META[key];
          const totalHeat = topics.reduce((s, t) => s + t.heat, 0);
          const viewerCount = totalHeat > 100000000
            ? (totalHeat / 100000000).toFixed(1) + '亿'
            : totalHeat > 10000
              ? Math.floor(totalHeat / 10000) + '万'
              : String(totalHeat);
          platforms.push({
            id: key,
            name: meta.name,
            color: meta.color,
            icon: meta.icon,
            viewerCount,
            topics,
          });
        }
      }

      if (platforms.length === 0) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').classList.remove('hidden');
        return;
      }

      // Build timeline
      const allTopics = [];
      for (const pf of platforms) {
        for (const t of pf.topics) {
          allTopics.push({
            title: t.title,
            heat: t.heat,
            heatDisplay: t.heatDisplay,
            platform: pf.name.replace(/热搜|热榜|热门/, ''),
          });
        }
      }

      const groups = [];
      for (const t of allTopics) {
        let added = false;
        for (const g of groups) {
          if (similarity(t.title, g.title) > 0.4) {
            g.items.push(t);
            if (t.heat > g.heat) { g.title = t.title; g.heat = t.heat; }
            g.platforms.add(t.platform);
            added = true;
            break;
          }
        }
        if (!added) {
          groups.push({
            title: t.title,
            heat: t.heat,
            items: [t],
            platforms: new Set([t.platform]),
          });
        }
      }

      groups.forEach(g => g.totalHeat = g.items.reduce((s, i) => s + i.heat, 0));
      groups.sort((a, b) => b.totalHeat - a.totalHeat);

      const timeline = groups.slice(0, 20).map((g, idx) => ({
        rank: idx + 1,
        title: g.title,
        heat: g.totalHeat,
        heatDisplay: formatHeat(g.totalHeat),
        trend: Math.random() > 0.3 ? 'up' : Math.random() > 0.5 ? 'flat' : 'down',
        platforms: Array.from(g.platforms).slice(0, 4),
      }));

      const now = new Date();
      const updateTime = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

      cachedData = { platforms, timeline, updateTime };

      document.getElementById('loading').classList.add('hidden');
      document.getElementById('updateTime').textContent = `${updateTime} 实时更新`;
      render();
    }

    function render() {
      if (!cachedData) return;
      renderDashboard();
      renderTimeline();

      if (currentMode === 'dashboard') {
        document.getElementById('dashboard').classList.remove('hidden');
        document.getElementById('timeline').classList.add('hidden');
      } else {
        document.getElementById('dashboard').classList.add('hidden');
        document.getElementById('timeline').classList.remove('hidden');
      }
    }

    function renderDashboard() {
      const el = document.getElementById('dashboard');
      el.innerHTML = cachedData.platforms.map(pf => {
        const maxHeat = Math.max(...pf.topics.map(t => t.heat));
        return `
          <div class="card">
            <div class="card-header">
              <div class="platform-info">
                <div class="platform-icon" style="background:${pf.color}">${pf.icon}</div>
                <div>
                  <div class="platform-name">${pf.name}</div>
                  <div class="platform-viewers">${pf.viewerCount}人在看</div>
                </div>
              </div>
              <span class="view-all">查看全部 →</span>
            </div>
            ${pf.topics.map(t => {
              const isTop3 = t.rank <= 3;
              const barWidth = (t.heat / maxHeat) * 100;
              return `
                <div class="topic">
                  <span class="rank ${isTop3 ? 'hot' : ''}">${t.rank}</span>
                  <span class="topic-title">${t.title}</span>
                  ${isTop3 ? `<div class="heat-bar" style="width:${Math.max(barWidth, 10)}px"></div>` : ''}
                  <span class="heat-text">${t.heatDisplay}</span>
                </div>
              `;
            }).join('')}
          </div>
        `;
      }).join('');
    }

    function renderTimeline() {
      const el = document.getElementById('timelineList');
      el.innerHTML = cachedData.timeline.map(item => {
        const isTop3 = item.rank <= 3;
        const trendClass = item.trend === 'up' ? 'trend-up' : item.trend === 'down' ? 'trend-down' : 'trend-flat';
        const trendIcon = item.trend === 'up' ? '↑' : item.trend === 'down' ? '↓' : '—';
        return `
          <div class="timeline-item">
            <div class="trend-line"></div>
            <div class="timeline-rank ${!isTop3 ? 'small' : ''}">${item.rank}</div>
            <div class="timeline-content">
              <div class="timeline-title">${item.title}</div>
              <div class="timeline-platforms">
                ${item.platforms.map(p => `
                  <span class="plat-tag">
                    <span class="plat-dot" style="background:${PLATFORM_COLOR[p] || '#6B6B6B'}"></span>
                    ${p}
                  </span>
                `).join('')}
              </div>
            </div>
            <div class="timeline-heat">
              <span class="timeline-heat-val">${item.heatDisplay}</span>
              <span class="trend-icon ${trendClass}">${trendIcon}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    // Init
    fetchData();
  </script>
</body>
</html>
